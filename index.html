<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00d4ff">
    <meta charset="UTF-8">
    <title>Club Robotique - Connexion</title>
    <!-- Importation des polices Tech -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Connexion</h2>
        <input type="text" id="username" placeholder="Nom d'utilisateur">
        <input type="password" id="code" placeholder="Code personnel">
        <button onclick="login()">Se connecter</button>
        <p id="msg"></p>
    </div>

    <script src="users.js"></script>
    <script src="script.js"></script>
    
    <!-- Script pour le mode hors-ligne -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log("Système de secours activé (Hors-ligne)"))
          .catch((err) => console.log("Erreur PWA :", err));
      }
    </script>
</body>
</html>
